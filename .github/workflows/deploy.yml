name: Build CSS

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci || npm install

      - name: Compile SCSS
        run: npm run build

      - name: Verify compiled CSS is up to date
        run: |
          if ! git diff --quiet -- styles/main.css; then
            echo "::warning::styles/main.css differs from the compiled output. Run 'npm run build' and commit the result."
            git --no-pager diff --stat -- styles/main.css
          fi

      - name: Lint JavaScript
        run: |
          for f in scripts/*.js locales/*.js; do
            node --check "$f" || exit 1
          done
